name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhackrf-dev libsdl2-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build RF/IQ application and tests
        run: cmake --build build --parallel 2

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: Run synthetic NTSC baseline
        run: ./build/synth_ntsc
